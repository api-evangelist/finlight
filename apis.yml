name: Finlight
description: >
  Finlight is a real-time financial news API that aggregates market-moving news,
  earnings reports, analyst upgrades, and corporate announcements for equities,
  currencies, and commodities. The platform delivers AI-driven sentiment analysis,
  entity extraction, and sub-second latency streaming for developers and enterprises
  building financial applications.
image: https://finlight.me/favicon.ico
tags:
  - Financial News
  - Sentiment Analysis
  - Market Data
  - Equities
  - Currencies
  - Commodities
  - Real-Time
  - Webhooks
  - WebSocket
created: '2026-06-13'
modified: '2026-06-13'
url: https://raw.githubusercontent.com/api-evangelist/finlight/refs/heads/main/apis.yml
specificationVersion: '0.19'
apis:
  - name: Finlight Financial News API
    description: >
      REST API for retrieving real-time financial news articles enriched with
      sentiment analysis, entity extraction, and company tagging. Supports
      advanced boolean query building with filtering by ticker, source, country,
      language, and date range. Returns structured JSON with article metadata,
      sentiment scores, confidence levels, and associated company entities.
    image: https://finlight.me/favicon.ico
    humanURL: https://finlight.me
    baseURL: https://api.finlight.me
    tags:
      - Financial News
      - REST API
      - Sentiment Analysis
      - Entity Extraction
